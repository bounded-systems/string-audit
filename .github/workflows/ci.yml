name: ci

# Content-audit pipeline: install → audit (deterministic) → cache invariant → extract+coverage.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install (wordlist + write-good)
        run: npm ci
      - name: Test — anthropic path (request shape + parsing)
        run: node test.mjs
      - name: Audit (deterministic — spell + grammar + grounding)
        run: node audit.mjs
      - name: Cache invariant (second run = 0 API calls)
        run: node audit.mjs | grep -q "0 miss"
      - name: Extract + coverage
        run: node extract.mjs samples/page.html
      - name: Room — mount the socket store + audit through it
        run: |
          node store-daemon.mjs &
          DPID=$!
          for i in $(seq 1 50); do [ -S .room/store.sock ] && break; sleep 0.1; done
          test -S .room/store.sock                       # the door is mounted in the room
          STORE=socket node audit.mjs                    # cold — populate via the socket
          STORE=socket node audit.mjs | grep -q "0 miss" # warm — 0 calls, served from the room
          kill "$DPID"
