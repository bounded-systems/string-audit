name: ci

# Smoke test: the deterministic auditor runs offline (no key) and the CAS cache works.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Audit (deterministic, offline)
        run: node audit.mjs
      - name: Cache is content-addressed (second run = 0 API calls)
        run: node audit.mjs | grep -q "0 miss"
