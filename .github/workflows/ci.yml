name: ci

# Content-audit pipeline: install (core) → audit (deterministic) → cache invariant
# → extract+coverage → install the optional CAS backends and exercise the socket store.
# The core install (npm ci --omit=optional) pulls the runtime deps — prose tools +
# verbspec (the typed report-tool contract). Only the heavy cas/anchored-chain
# signing/CAS backends are optional, installed on demand for the socket-store step, so
# their npm.jsr.io fetch can't break the default pipeline.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install — core deps (prose tools + verbspec), no CAS backends
        run: npm ci --omit=optional
      - name: Test — anthropic path (request shape + parsing)
        run: node test.mjs
      - name: Audit (deterministic — spell + grammar + grounding)
        run: node audit.mjs
      - name: Cache invariant (second run = 0 API calls)
        run: node audit.mjs | grep -q "0 miss"
      - name: Extract + coverage
        run: node extract.mjs samples/page.html
      - name: MCP — tools/list + tools/call(extract) over stdio
        run: |
          OUT=$(printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"extract","arguments":{"file":"samples/page.html"}}}' \
            | node mcp.mjs)
          echo "$OUT"
          echo "$OUT" | grep -q '"name":"audit"'    # tools/list projects the audit verb
          echo "$OUT" | grep -q '"name":"extract"'  # ...and the extract verb
          echo "$OUT" | grep -q 'coverage'          # tools/call runs extract → structured output
      - name: Registry drift spike smoke-test
        run: node spikes/registry-drift.mjs
      - name: Install optional CAS backends + textlint for the socket store step
        run: npm install --include=optional --no-audit --no-fund
      - name: Room — mount the socket store + audit through it
        run: |
          node store-daemon.mjs &
          DPID=$!
          for i in $(seq 1 50); do [ -S .room/store.sock ] && break; sleep 0.1; done
          test -S .room/store.sock                       # the door is mounted in the room
          STORE=socket node audit.mjs                    # cold — populate via the socket
          STORE=socket node audit.mjs | grep -q "0 miss" # warm — 0 calls, served from the room
          kill "$DPID"
